<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" href="css/style.css">

<title>Form</title>
</head>
<body>

  <div class="box">
    <form action="#">

      <label for="">Inserisci il nome * </label> <br>
      <input type="text" placeholder="Nome" required> <br>
      <label for="">Inserisci la mail * </label> <br>
      <input type="email" placeholder="Email" required> <br>
      <label for="">Messaggio</label> <br>
      <textarea  cols="50" rows="20" placeholder="Scrivi il tuo messaggio"></textarea> <br>
      <label for="">Cosa mangi a pranzo?</label> <br>

      <select name="" id="">

        <option value="">Scegli un piatto</option>
        <option value="">Lasagne</option>
        <option value="">Stufato d'asino con polenta</option>
        <option value="">Nulla</option>

      </select><br>

      <label for="">Scegli un colore</label> <br>
      <label for="rosso">Rosso</label> <input id="rosso" type="radio" name="color">
      <label for="verde">Verde</label><input id="verde" type="radio" name="color">
      <label for="blue">Blue</label><input id="blue" type="radio" name="color">
      <br>
      <label for="">Scegli un colore</label> <br>
      <label for="">Rosso</label> <input type="checkbox" name="color">
      <label for="">Verde</label><input type="checkbox" name="color">
      <label for="">Blue</label><input type="checkbox" name="color">
      <br>
      <input type="checkbox"> <label for="">Accetta la privacy</label> <br>
      <button type="submit" >Invia</button>

    </form>
    
  </div>

</body>
</html>
